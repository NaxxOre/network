services:
  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: opensearch
    environment:
      - cluster.name=webauthguard-cluster
      - node.name=opensearch
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "DISABLE_SECURITY_PLUGIN=true"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"
      - "9600:9600"
    networks: [webauthguard-net]

  dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: dashboards
    command:
      - opensearch-dashboards
      - --host=0.0.0.0
      - --opensearch.hosts=http://opensearch:9200
      - --server.basePath=/dashboards
      - --server.rewriteBasePath=true
    environment:
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on: [opensearch]
    networks: [webauthguard-net]

  nginx:
    image: nginx:1.27-alpine
    container_name: web-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [guard, dashboards]
    networks: [webauthguard-net]

  resource:
    build: ./resource_server
    container_name: resource
    ports:
      - "8001:8001"
    networks: [webauthguard-net]
    volumes:
      - ./resource_server/app/storage:/app/storage

  guard:
    build: ./webauthguard
    container_name: guard
    ports:
      - "8000:8000"
    volumes:
      - ./webauthguard/app/storage:/app/storage
    depends_on: [opensearch, resource]
    networks: [webauthguard-net]
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - RESOURCE_BASE=http://resource:8001
      - TELEGRAM_ENABLED=true
      - TELEGRAM_BOT_TOKEN=7224042488:AAHh9-YPQwX5-YfFAIWMOQy3mZ8d1yC7bvQ
      - TELEGRAM_CHAT_ID=5520004763
      - BRUTE_FORCE_WINDOW_SECONDS=60
      - BRUTE_FORCE_THRESHOLD=5
      - BRUTE_FORCE_ALERT_COOLDOWN_SECONDS=300
      - DIFFERENT_IP_WINDOW_SECONDS=600
      - DIFFERENT_IP_THRESHOLD=2
      - GEO_WINDOW_SECONDS=1800
      - PARALLEL_SESSION_WINDOW_SECONDS=900
      - MAX_PARALLEL_SESSIONS=4
      - AUTH_DB_PATH=/app/storage/auth.db
      - AUTH_SECRET=${AUTH_SECRET:-change-me-auth-secret}
      - AUTH_WEBID_BASE=https://local.example/users
      - AUTH_TOKEN_TTL_MINUTES=1440
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
      - AUTH_ATTEMPT_WINDOW_SECONDS=900
      - ACCOUNT_BRUTE_FORCE_THRESHOLD=6
      - CREDENTIAL_STUFFING_ACCOUNT_THRESHOLD=5
      - DISTRIBUTED_ACCOUNT_ATTACK_SOURCE_THRESHOLD=3

networks:
  webauthguard-net:
    driver: bridge
